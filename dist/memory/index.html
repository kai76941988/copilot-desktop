<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copilot Memory Hub</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="top">
        <div class="brand">Copilot Memory Hub</div>
        <div class="actions">
          <button id="btnRefresh">Refresh</button>
          <button id="btnNewProject">New Project</button>
        </div>
      </header>

      <div class="content">
        <aside class="projects">
          <div class="section-title">Projects</div>
          <div id="projectList" class="list"></div>
        </aside>

        <main class="main">
          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">Sessions</div>
              <div class="panel-actions">
                <button id="btnSetActive">Set Active</button>
              </div>
            </div>
            <div id="sessionList" class="list sessions"></div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">Project Summary</div>
              <div class="panel-actions">
                <button id="btnRefreshSummary">Refresh</button>
              </div>
            </div>
            <div id="projectSummary" class="summary-box">No summary yet.</div>
            <div class="section-title">Summary Blocks</div>
            <div id="summaryList" class="list summaries"></div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">Summarizer</div>
              <div class="panel-actions">
                <button id="btnSaveSummarizer">Save</button>
                <button id="btnRunSummarizer">Run Now</button>
              </div>
            </div>
            <div class="form-grid">
              <label>Mode</label>
              <select id="summarizerMode">
                <option value="rule">rule (local)</option>
                <option value="remote">remote (LLM)</option>
              </select>
              <label>Endpoint</label>
              <input id="summarizerEndpoint" placeholder="https://your-llm-endpoint" />
              <label>API Key</label>
              <input id="summarizerApiKey" type="password" placeholder="optional" />
              <label>Model</label>
              <input id="summarizerModel" placeholder="model name (optional)" />
              <label>Prompt</label>
              <textarea id="summarizerPrompt" placeholder="summarizer prompt"></textarea>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">Tags & Export</div>
              <div class="panel-actions">
                <button id="btnAutoTag">Auto Tag</button>
                <button id="btnExport">Export</button>
              </div>
            </div>
            <div class="section-title">Top Tags</div>
            <div id="tagList" class="list tags"></div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">Session Messages</div>
              <div class="panel-actions">
                <button id="btnLoadMore">Load More</button>
              </div>
            </div>
            <div id="messageList" class="list messages"></div>
          </div>

          <div class="panel">
            <div class="panel-header">
              <div class="panel-title">Context Pack</div>
              <div class="panel-actions">
                <button id="btnGenerate">Generate</button>
                <button id="btnCopy">Copy</button>
                <button id="btnContinue">Send To Copilot</button>
              </div>
            </div>
            <textarea id="contextPack" placeholder="Context pack will appear here..."></textarea>
          </div>
        </main>

        <section class="search">
          <div class="section-title">Search</div>
          <div class="search-bar">
            <input id="searchInput" placeholder="Search messages..." />
            <select id="searchScope">
              <option value="messages">Messages</option>
              <option value="summaries">Summaries</option>
            </select>
            <button id="btnSearch">Search</button>
          </div>
          <label class="checkbox">
            <input type="checkbox" id="searchProjectOnly" checked />
            Current project only
          </label>
          <div id="searchResults" class="list results"></div>
        </section>
      </div>

      <div id="status" class="status">Ready</div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
