name: Build Microsoft Copilot Desktop App

on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/pake.json'
      - 'src-tauri/tauri.conf.json'
      - 'src-tauri/tauri.windows.conf.json'
      - '.github/workflows/build-copilot.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        type: boolean
        default: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"
  RUST_VERSION: "1.93.0"

jobs:
  build:
    name: Build Microsoft Copilot for Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Rust target for Windows
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm run cli:build

      - name: Verify configuration files
        run: |
          echo "Checking pake.json..."
          cat src-tauri/pake.json
          echo ""
          echo "Checking tauri.conf.json..."
          cat src-tauri/tauri.conf.json
          echo ""
          echo "Checking tauri.windows.conf.json..."
          cat src-tauri/tauri.windows.conf.json

      - name: Verify icon files
        run: |
          echo "Checking icon files..."
          dir src-tauri\png\copilot_*.ico
          dir src-tauri\png\copilot_*.png

      - name: Build Tauri App (Release)
        if: ${{ github.event.inputs.debug != 'true' }}
        run: pnpm run build
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Build Tauri App (Debug)
        if: ${{ github.event.inputs.debug == 'true' }}
        run: pnpm run build:debug
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Find generated MSI package
        id: find_package
        run: |
          $PACKAGE = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($PACKAGE) {
            echo "package_path=$($PACKAGE.FullName)" >> $env:GITHUB_OUTPUT
            echo "package_name=$($PACKAGE.Name)" >> $env:GITHUB_OUTPUT
            echo "✅ Found package: $($PACKAGE.Name)"
          } else {
            echo "❌ No MSI package found"
            exit 1
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v6
        with:
          name: Microsoft-Copilot-Windows
          path: ${{ steps.find_package.outputs.package_path }}
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ steps.find_package.outputs.package_path }}
          name: Microsoft Copilot ${{ github.ref_name }}
          body: |
            # Microsoft Copilot Desktop App
            
            ## Features
            - 🎯 Optimized for 1366x768 laptop screens
            - ⚡ GPU acceleration enabled (WebGPU)
            - 💾 Low memory footprint (~50-100MB)
            - 🚀 Smooth scrolling for long articles
            - 🖥️ Windows 10/11 support
            
            ## Installation
            Download the MSI installer and run it to install.
            
            ## System Requirements
            - Windows 10 or later
            - Microsoft Edge WebView2 Runtime (usually pre-installed)
            - GPU: Any DirectX 11+ compatible GPU (for hardware acceleration)
            
            ## Build Configuration
            - Window Size: 1280x720 (adapts to screen)
            - Min Size: 1024x600
            - GPU Acceleration: Enabled
            - System Tray: Enabled
            
            Built with Pake + Tauri 2.10.2 + Rust 1.93.0

  # Optional: Build for other platforms
  build-macos:
    name: Build for macOS (Optional)
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build CLI
        run: pnpm run cli:build

      - name: Build for macOS
        run: pnpm run build:mac

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: Microsoft-Copilot-macOS
          path: src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          retention-days: 30
