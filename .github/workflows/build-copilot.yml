name: Build Microsoft Copilot Desktop App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-all-crates: true

      - name: Debug - Check dist directory
        run: |
          Write-Host "=== Checking CLI build output ==="
          if (Test-Path "dist/cli.js") {
            Write-Host "✅ dist/cli.js exists"
            $size = (Get-Item "dist/cli.js").Length
            Write-Host "Size: $size bytes"
          } else {
            Write-Host "❌ dist/cli.js NOT found"
            Get-ChildItem dist -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          }

      - name: Prepare frontend resources
        run: |
          Write-Host "=== Preparing dist directory ==="
          if (-not (Test-Path "dist")) {
            New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          }
          
          # Create a simple HTML index
          $html = @"
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Microsoft Copilot</title>
              <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
              </style>
            </head>
            <body>
              <div id="app">Loading Microsoft Copilot...</div>
              <script>console.log('App started');</script>
            </body>
          </html>
          "@
          
          $html | Out-File -FilePath "dist/index.html" -Encoding UTF8 -Force
          Write-Host "✅ dist/index.html created"

      - name: Verify configuration files
        run: |
          Write-Host "=== Checking pake.json ==="
          if (Test-Path "src-tauri\pake.json") {
            Get-Content "src-tauri\pake.json"
          } else {
            Write-Host "❌ pake.json not found"
          }
          
          Write-Host ""
          Write-Host "=== Checking tauri.conf.json ==="
          if (Test-Path "src-tauri\tauri.conf.json") {
            Get-Content "src-tauri\tauri.conf.json"
          } else {
            Write-Host "❌ tauri.conf.json not found"
          }
          
          Write-Host ""
          Write-Host "=== Checking dist directory ==="
          if (Test-Path "dist") {
            Get-ChildItem "dist" -Recurse
          } else {
            Write-Host "❌ dist directory not found"
          }
          
          Write-Host ""
          Write-Host "=== Checking icon files ==="
          Get-ChildItem "src-tauri\png\copilot_*.ico" -ErrorAction SilentlyContinue | Select-Object Name
          Get-ChildItem "src-tauri\png\copilot_*.png" -ErrorAction SilentlyContinue | Select-Object Name

      - name: Build Tauri App
        run: |
          Write-Host "=== Starting Tauri Build ==="
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Listing src-tauri contents:"
          Get-ChildItem "src-tauri" -Depth 2
          
          Write-Host ""
          Write-Host "=== Checking Rust setup ==="
          rustc --version
          cargo --version
          
          Write-Host ""
          Write-Host "=== Running pnpm run build with verbose output ==="
          $env:RUST_BACKTRACE = "1"
          pnpm run build 2>&1 | Tee-Object -Variable buildOutput
          
          Write-Host ""
          Write-Host "=== Build completed ==="
          if ($LASTEXITCODE -ne 0) {
            Write-Host "❌ Build failed with exit code: $LASTEXITCODE"
            Write-Host ""
            Write-Host "Last output:"
            $buildOutput[-20..-1] | ForEach-Object { Write-Host $_ }
          } else {
            Write-Host "✅ Build completed successfully"
          }
        shell: pwsh

      - name: Check build output directories
        if: always()
        run: |
          Write-Host "=== Checking all possible build outputs ==="
          
          $searchPaths = @(
            "src-tauri\target\release",
            "src-tauri\target\release\bundle",
            "src-tauri\target\release\deps",
            "target\release\bundle"
          )
          
          foreach ($path in $searchPaths) {
            if (Test-Path $path) {
              Write-Host "Found: $path"
              Get-ChildItem -Path $path -Recurse -ErrorAction SilentlyContinue | 
                Where-Object { $_.Extension -in '.exe', '.msi', '.dll' } | 
                ForEach-Object { Write-Host "  - $($_.FullName)" }
            } else {
              Write-Host "Not found: $path"
            }
          }
          
          Write-Host ""
          Write-Host "=== Checking for any recent files (last 10 minutes) ==="
          Get-ChildItem -Path "src-tauri\target" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.LastWriteTime -gt (Get-Date).AddMinutes(-10) } |
            Select-Object FullName, LastWriteTime |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 20
        shell: pwsh

      - name: Find generated MSI package
        if: always()
        id: find_package
        run: |
          if (Test-Path "src-tauri\target\release\bundle\msi") {
            $PACKAGE = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($PACKAGE) {
              echo "package_path=$($PACKAGE.FullName)" >> $env:GITHUB_OUTPUT
              echo "package_name=$($PACKAGE.Name)" >> $env:GITHUB_OUTPUT
              Write-Host "✅ Found MSI package: $($PACKAGE.Name)"
              exit 0
            }
          }
          
          Write-Host "❌ Build failed: No MSI package generated"
          Write-Host ""
          Write-Host "The Tauri build did not produce output. Check the 'Build Tauri App' logs above for errors."
          exit 1

      - name: Upload MSI artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Microsoft-Copilot-Windows-Installer
          path: ${{ steps.find_package.outputs.package_path }}
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ steps.find_package.outputs.package_path }}
          tag: v1.0.${{ github.run_number }}
          name: Microsoft Copilot Desktop v1.0.${{ github.run_number }}
          body: |
            # Microsoft Copilot Desktop Application

            Windows desktop application powered by Microsoft Copilot.

            ## Installation
            Download the MSI installer and run it.

            ## System Requirements
            - Windows 10 or later  
            - .NET Runtime (automatically installed)

            Built with Pake + Tauri
