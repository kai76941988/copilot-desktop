name: Build Microsoft Copilot Desktop App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Rust
        uses: actions/rust-lang/setup-rust-toolchain@v1
        with:
          rust-version: '1.93.0'
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm run cli:build

      - name: Verify configuration files
        run: |
          echo "=== Checking pake.json ==="
          cat src-tauri/pake.json
          echo ""
          echo "=== Checking tauri.conf.json ==="
          cat src-tauri/tauri.conf.json
          echo ""
          echo "=== Checking icon files ==="
          dir src-tauri\png\copilot_*.ico
          dir src-tauri\png\copilot_*.png

      - name: Build Tauri App
        run: pnpm run build:msi
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Find generated MSI package
        id: find_package
        run: |
          $PACKAGE = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($PACKAGE) {
            echo "package_path=$($PACKAGE.FullName)" >> $env:GITHUB_OUTPUT
            echo "package_name=$($PACKAGE.Name)" >> $env:GITHUB_OUTPUT
            echo "✅ Found package: $($PACKAGE.Name)"
          } else {
            echo "❌ No MSI package found. Looking for other formats..."
            $PACKAGE = Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($PACKAGE) {
              echo "package_path=$($PACKAGE.FullName)" >> $env:GITHUB_OUTPUT
              echo "package_name=$($PACKAGE.Name)" >> $env:GITHUB_OUTPUT
              echo "⚠️ Found package (not MSI format): $($PACKAGE.Name)"
            } else {
              echo "❌ No package found at all"
              exit 1
            }
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Microsoft-Copilot-Windows-Installer
          path: ${{ steps.find_package.outputs.package_path }}
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ steps.find_package.outputs.package_path }}
          tag: v1.0.${{ github.run_number }}
          name: Microsoft Copilot Desktop v1.0.${{ github.run_number }}
          body: |
            # Microsoft Copilot Desktop App
            
            ## Features
            - 🎯 Optimized for 1366x768 laptop screens
            - ⚡ GPU acceleration enabled (WebGPU)
            - 💾 Low memory footprint (~50-100MB)
            - 🚀 Smooth scrolling for long articles
            - 🖥️ Windows 10/11 support
            - 🔔 System tray support
            
            ## Installation
            Download the MSI installer and run it to install.
            
            ## System Requirements
            - Windows 10 or later
            - Microsoft Edge WebView2 Runtime (usually pre-installed)
            - GPU: Any DirectX 11+ compatible GPU (for hardware acceleration)
            
            ## Build Configuration
            - Window Size: 1280x720 (adapts to screen)
            - Min Size: 1024x600
            - GPU Acceleration: Enabled
            - System Tray: Enabled
            
            Built with Pake + Tauri + Rust
          draft: false
          prerelease: false
