name: Build Microsoft Copilot Desktop App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-all-crates: true

      - name: Debug - Check dist directory
        run: |
          Write-Host "=== Checking CLI build output ==="
          if (Test-Path "dist/cli.js") {
            Write-Host "✅ dist/cli.js exists"
            $size = (Get-Item "dist/cli.js").Length
            Write-Host "Size: $size bytes"
          } else {
            Write-Host "❌ dist/cli.js NOT found"
            Get-ChildItem dist -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          }

      - name: Prepare frontend resources
        run: |
          Write-Host "=== Preparing dist directory ==="
          if (-not (Test-Path "dist")) {
            New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          }
          
          # Create a simple HTML index
          $html = @"
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Microsoft Copilot</title>
              <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
              </style>
            </head>
            <body>
              <div id="app">Loading Microsoft Copilot...</div>
              <script>console.log('App started');</script>
            </body>
          </html>
          "@
          
          $html | Out-File -FilePath "dist/index.html" -Encoding UTF8 -Force
          Write-Host "✅ dist/index.html created"

      - name: Verify configuration files
        run: |
          echo "=== Checking pake.json ==="
          type src-tauri\pake.json
          echo ""
          echo "=== Checking tauri.conf.json ==="
          type src-tauri\tauri.conf.json
          echo ""
          echo "=== Checking icon files ==="
          dir src-tauri\png\copilot_*.ico
          dir src-tauri\png\copilot_*.png

      - name: Build Tauri App
        run: pnpm run build
        continue-on-error: true

      - name: Check build output directories
        run: |
          Write-Host "=== Checking target/release/bundle ==="
          if (Test-Path "src-tauri\target\release\bundle") {
            Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse | Select-Object FullName
          } else {
            Write-Host "❌ target/release/bundle directory does not exist"
          }
          
          Write-Host ""
          Write-Host "=== Checking src-tauri/target ==="
          if (Test-Path "src-tauri\target") {
            Get-ChildItem -Path "src-tauri\target" -MaxDepth 2 | Select-Object FullName
          }

      - name: Find generated MSI package
        id: find_package
        run: |
          $PACKAGE = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($PACKAGE) {
            echo "package_path=$($PACKAGE.FullName)" >> $env:GITHUB_OUTPUT
            echo "package_name=$($PACKAGE.Name)" >> $env:GITHUB_OUTPUT
            Write-Host "✅ Found MSI package: $($PACKAGE.Name)"
            exit 0
          } else {
            Write-Host "❌ No MSI package found in msi folder"
            Write-Host "=== Searching all release bundles ==="
            Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in '.msi', '.exe' } | ForEach-Object { Write-Host "Found: $($_.FullName)" }
            exit 1
          }

      - name: Upload MSI artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Microsoft-Copilot-Windows-Installer
          path: ${{ steps.find_package.outputs.package_path }}
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ steps.find_package.outputs.package_path }}
          tag: v1.0.${{ github.run_number }}
          name: Microsoft Copilot Desktop v1.0.${{ github.run_number }}
          body: |
            # Microsoft Copilot Desktop Application

            Windows desktop application powered by Microsoft Copilot.

            ## Installation
            Download the MSI installer and run it.

            ## System Requirements
            - Windows 10 or later  
            - .NET Runtime (automatically installed)

            Built with Pake + Tauri
